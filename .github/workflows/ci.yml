# ───────────────────────────────────────────────────────────────────────
# ci.yml — basic pytest + lint on every push / PR.
#
# This is the green-light CI that complements the two harness-L6
# workflows (which run on schedule, not per-commit). Keep it tight
# so feedback to PR authors is fast — under 5 minutes is the goal.
# ───────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/ tests/ dashboard/ scripts/ || true   # tolerant; pre-existing lints documented
      - name: Pytest
        run: pytest -q --tb=short
